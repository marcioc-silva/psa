{% extends "mydot_base.html" %}

{% block content %}
<div class="mydot-page">
  <div class="mydot-top">
    <a class="btn btn-sm btn-outline-light" href="{{ url_for('mydot.home') }}">🏠 Home</a>
    <div class="title">Registrar Ponto</div>
    <a class="btn btn-sm btn-outline-light" href="{{ url_for('mydot.history') }}">🗂 Histórico</a>
  </div>

  <div class="mydot-cam">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" class="d-none"></canvas>
  </div>

  <div class="mydot-actions">
    <button class="btn btn-lg btn-primary w-100" id="btnSnap">
      Tirar foto e registrar
    </button>
    <div id="status" class="mt-2" style="min-height:1.4rem;"></div>
  </div>
</div>

<style>
  .mydot-page{
    height: 100dvh;
    padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .mydot-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .title{ font-weight:800; font-size:16px; }
  .mydot-cam{
    flex: 1;
    border-radius: 16px;
    overflow:hidden;
    background:#000;
    border: 1px solid rgba(255,255,255,.12);
  }
  #video{
    width: 100%;
    max-width: 420px;
    height: 60vh;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    }
    object-fit:cover;
    display:block;
  
  .mydot-actions{ padding-bottom: 6px; }
</style>
{% endblock %}
