{% extends "mydot_base.html" %}

{% block content %}
<div class="mydot-page">
  <div class="mydot-top">
    <a class="btn btn-sm btn-outline-light" href="{{ url_for('mydot.home') }}">🏠 Home</a>
    <div class="title">Registrar Ponto</div>
    <a class="btn btn-sm btn-outline-light" href="{{ url_for('mydot.history') }}">🗂 Histórico</a>
  </div>

  <div class="mydot-cam">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" class="d-none"></canvas>
  </div>
  <div class="mb-2">
    <label class="form-label text-light">Data e hora do ponto</label>
    <input id="dtLocal" type="datetime-local" class="form-control" />
    <small class="text-light opacity-75">
        Ajuste se estiver registrando depois do horário real.
    </small>
</div>
  <div class="mydot-actions">
    <button class="btn btn-lg btn-primary w-100" id="btnSnap">
      Tirar foto e registrar
    </button>
    <div id="status" class="mt-2" style="min-height:1.4rem;"></div>
  </div>
  <div class="espacador-seguro"></div>  
</div>

<style>
  .mydot-page {
    /* dvh é excelente, pois se adapta dinamicamente à barra de endereços/menu */
    height: 100dvh; 
    /* O padding inferior garante que nada toque no menu do sistema */
    padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-sizing: border-box; /* Garante que o padding não aumente o tamanho da página */
  } 
  .mydot-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .title{ font-weight:800; font-size:16px; }

  .mydot-cam {
    flex: 1; /* Faz este container ocupar todo o espaço central disponível */
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    border: 1px solid rgba(255,255,255,.12);
  }
  #video {
    width: 100%;
    max-width: 420px;
    /* Removemos o 60vh fixo para que ele se ajuste ao espaço que sobra */
    height: 100%; 
    max-height: 100%;
    margin: 0 auto;
    object-fit: cover; /* Importante: mantém a proporção sem distorcer */
    display: block;
    border-radius: 16px;
  }
    
  
  .mydot-actions{ 
    background-color: #007bff; /* Cor azul do seu botão */
    color: white;
    width: 100%;
    border: none;
    padding-top: 15px;    /* Espaço interno em cima */
    
    /* A MÁGICA ESTÁ AQUI: */
    /* Ele vai somar 15px de respiro + o tamanho da barra do Android */
    padding-bottom: calc(15px + env(safe-area-inset-bottom, 12px)); 
    
    text-align: center;
    font-size: 18px; 
  }
</style>
{% endblock %}
