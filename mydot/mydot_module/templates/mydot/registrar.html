{% extends "mydot_base.html" %}

{% block content %}
<div class="container py-3">
  <h4 class="mb-3">Registrar Ponto</h4>

  <div class="card p-3 shadow-sm">
    <div class="mb-2">
      <video id="video" autoplay playsinline class="w-100 rounded" style="background:#000; max-height: 60vh;"></video>
      <canvas id="canvas" class="d-none"></canvas>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" id="btnSnap">Tirar foto e registrar</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('mydot.history') }}">Consultar</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('mydot.config') }}">Config</a>
    </div>

    <div class="mt-3" id="status" style="min-height: 1.5rem;"></div>
  </div>
</div>
{% endblock %}
