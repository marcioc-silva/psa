{% extends "base.html" %}

{% block content %}
    <div class="container-fluid">
        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
                <div class="card-body">
                    <h3 class="card-title text-center">Novo Usuário PSA</h3>
                    <form action="/registrar" method="POST">
                        <div class="mb-3">
                            <label>SAP</label>
                            <input type="text" name="sap" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Nome Completo</label>
                            <input type="text" name="nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Criar Conta</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('login') }}">Já tenho cadastro</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
