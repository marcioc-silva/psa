{% extends "base.html" %}

{% block title %}Conferência PSA - Nestlé Araçatuba{% endblock %}

{% block content %}
<style>
    /* Estilos Gerais e Scanner */
    #reader { 
        width: 100%; 
        border-radius: 15px; 
        overflow: hidden; 
        background: #000; 
        border: 3px solid #007bff;
    }
    #reader video { object-fit: cover; }
    .scan-area { max-width: 500px; margin: 0 auto; }
    
    .btn-manual-fixo {
        position: fixed;
        bottom: 60px;
        left: 0;
        width: 100%;
        background-color: #ffc107 !important;
        color: #000 !important;
        font-weight: bold;
        padding: 16px;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        z-index: 2000;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
    }

    body { padding-bottom: 130px !important; }

    /* Modal de Busca Manual Fullscreen */
    #modal-busca-manual {
        display: none; 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(0,0,0,0.95); 
        z-index: 3000; 
        padding: 20px;
    }
</style>

<div class="container text-center mt-3 scan-area pb-5">
    <h3 class="fw-bold text-primary mb-3">
        <i class="bi bi-qr-code-scan me-2"></i>Conferência PSA
    </h3>
    
    <div id="control-area">
        <button id="btn-conferir" class="btn btn-primary w-100 py-4 shadow fw-bold fs-5" onclick="startScanner()">
            <i class="bi bi-camera-video me-2"></i> INICIAR LEITURA
        </button>
        
        <button id="btn-parar" class="btn btn-outline-danger w-100 py-3 mt-3 fw-bold" onclick="stopScanner()" style="display:none;">
            <i class="bi bi-stop-circle me-2"></i> CANCELAR CÂMERA
        </button>
    </div>

    <div id="reader" class="mt-3 shadow" style="display:none;"></div>
    <div id="last-result" class="mt-3 text-muted small fw-bold">Aguardando leitura...</div>
    
    <button class="btn-manual-fixo" onclick="abrirBuscaManual()">
        <i class="bi bi-keyboard-fill"></i> DIGITAR UD MANUALMENTE
    </button>
</div>

<div class="modal fade" id="modalResultado" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header" style="background-color: #007bff; color: white; padding: 12px 15px; border: none;">
        <h6 class="m-0 fw-bold">Detalhes da Unidade (UD)</h6>
        <button type="button" class="btn-close btn-close-white" onclick="fecharModal()"></button>
      </div>
      
      <div class="modal-body p-0 text-center">
        <input type="hidden" id="mat-id">
        
        <div class="py-3">
            <div class="text-muted small fw-bold">Unidade Depósito</div>
            <div id="res-ud" class="text-primary fw-bold fs-2"></div>
        </div>

        <div class="px-3 mb-3">
            <label class="text-muted small fw-bold d-block mb-1 text-start">Descrição do Material</label>
            <div id="res-nome" class="form-control bg-light fw-bold fs-3 text-start border-0" style="min-height: 45px; background-color: #f8f9fa !important;"></div>
        </div>

        <div class="container-fluid pb-3">
            <div class="row mb-3">
                <div class="col-6">
                    <span class="text-muted small d-block fw-bold">Qtd Estoque</span>
                    <span id="res-qtd" class="fw-bold fs-5"></span>
                </div>
                <div class="col-6">
                    <span class="text-muted small d-block fw-bold">Lote</span>
                    <span id="res-lote" class="fw-bold fs-5"></span>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-6">
                    <span class="text-muted small d-block fw-bold">Vencimento</span>
                    <span id="res-venc" class="fw-bold fs-5 text-danger"></span>
                </div>
                <div class="col-6">
                    <span class="text-muted small d-block fw-bold">Ultima Movimentação</span>
                    <span id="res-ult-mov" class="fw-bold fs-5"></span>
                </div>
            </div>

            <div class="row">
                <div class="col-12 d-flex align-items-center justify-content-center">
                    <div id="status-conferido" class="badge bg-success rounded-pill px-4 py-2" style="display:none; font-size: 0.85rem;">CONFERIDO</div>
                </div>
            </div>
        </div>

        <div class="p-3 border-top bg-white">
            <div class="form-check form-switch d-flex align-items-center justify-content-center gap-2 p-3 rounded border border-warning" style="background-color: #fff3cd;">
                <input class="form-check-input" type="checkbox" id="checkDivergenciaConferencia" onchange="toggleObservacaoConferencia()">
                <label class="form-check-label fw-bold text-danger mb-0" for="checkDivergenciaConferencia">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> APONTAR DIVERGÊNCIA?
                </label>
            </div>
            <div class="d-none mt-2 text-start" id="campoObservacaoConferencia">
                <label class="small fw-bold text-muted">OBSERVAÇÕES:</label>
                <textarea class="form-control border-danger shadow-sm" id="txtObservacaoConferencia" rows="2" placeholder="Descreva aqui o problema encontrado..."></textarea>
            </div>
        </div>
      </div>

      <div class="modal-footer border-0 p-3">
        <button type="button" class="btn btn-outline-secondary flex-grow-1 py-2 fw-bold" onclick="fecharModal()">CANCELAR</button>
        <button type="button" class="btn btn-success flex-grow-1 py-2 fw-bold" onclick="confirmarLeitura()">CONFIRMAR</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-busca-manual">
    <div class="d-flex justify-content-between align-items-center mb-3 text-white">
        <h5 class="m-0"><i class="bi bi-search me-2"></i>Pesquisa Manual</h5>
        <button class="btn btn-close btn-close-white" onclick="fecharBuscaManual()"></button>
    </div>
    <input type="number" id="input-ud-manual" class="form-control form-control-lg mb-3 shadow" placeholder="Digite a UD..." autocomplete="off">
    <div id="lista-resultados" class="list-group" style="max-height: 70vh; overflow-y: auto;"></div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
    let html5QrCode;
    const readerElement = "reader";

    // --- INTERFACE (POKA-YOKE) ---
    function toggleObservacaoConferencia() {
        const checked = document.getElementById('checkDivergenciaConferencia').checked;
        const campo = document.getElementById('campoObservacaoConferencia');
        if (campo) campo.classList.toggle('d-none', !checked);
    }

    function fecharModal() {
        const modalEl = document.getElementById('modalResultado');
        const modal = bootstrap.Modal.getInstance(modalEl);
        if(modal) modal.hide();
        if(html5QrCode && html5QrCode.getState() === 3) html5QrCode.resume();
        
        // Reset dos campos de divergência
        document.getElementById('checkDivergenciaConferencia').checked = false;
        document.getElementById('campoObservacaoConferencia').classList.add('d-none');
        document.getElementById('txtObservacaoConferencia').value = '';
    }

    // --- MOTOR DO SCANNER ---
    function startScanner() {
        document.getElementById('btn-conferir').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btn-parar').style.display = 'block';
        html5QrCode = new Html5Qrcode(readerElement);
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: 250 }, 
            onScanSuccess
        ).catch(err => alert("Erro ao abrir câmera: " + err));
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.getState() > 1) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btn-conferir').style.display = 'block';
                document.getElementById('btn-parar').style.display = 'none';
            });
        }
    }

    function onScanSuccess(decodedText) {
        let pos = decodedText.indexOf("376");
        if (pos === -1) return;
        html5QrCode.pause();
        consultarUD(decodedText.substring(pos));
    }

    // --- BUSCA E PREENCHIMENTO (SINCRONIZADO COM TO_DICT) ---
    function consultarUD(ud) {
        const udLimpa = ud.trim();
        const udParaBusca = encodeURIComponent(udLimpa);

        console.log(">>> Buscando UD na base PSA: " + udLimpa);

        // Chamando a rota de detalhes que retorna o seu to_dict()
        fetch(`/get_detalhes_ud/${udParaBusca}`)
            .then(response => {
                if (!response.ok) throw new Error('UD_NAO_ENCONTRADA');
                return response.json();
            })
            .then(data => {
                // MAPEAMENTO: IDs do HTML vs Chaves do seu to_dict()
                document.getElementById('mat-id').value = data.id;
                document.getElementById('res-ud').innerText = data.ud;
                document.getElementById('res-nome').innerText = data.descricao || "Sem descrição"; // Fix: desc_material
                document.getElementById('res-qtd').innerText = data.qtd + " " + (data.unidade || "UNI");
                document.getElementById('res-lote').innerText = data.lote || "S/L";
                document.getElementById('res-venc').innerText = data.vencimento || "S/V";
                document.getElementById('res-ult-mov').innerText = data.ult_mov || "---";

                // Status Visual
                const badge = document.getElementById('status-conferido');
                if (badge) {
                    badge.style.display = (data.status === 'CONFERIDO') ? 'block' : 'none';
                }

                const modalEl = document.getElementById('modalResultado');
                bootstrap.Modal.getOrCreateInstance(modalEl).show();
            })
            .catch(err => {
                console.error("Erro PSA:", err);
                alert(`Erro: A UD "${udLimpa}" não foi localizada.`);
                if(html5QrCode) html5QrCode.resume();
            });
    }

    function confirmarLeitura() {
        const payload = {
            id: document.getElementById('mat-id').value,
            possui_divergencia: document.getElementById('checkDivergenciaConferencia').checked,
            observacao: document.getElementById('txtObservacaoConferencia').value
        };
        fetch('/api/confirmar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(() => {
            fecharModal();
            location.reload(); // Atualiza os cards estáticos
        });
    }

    // --- BUSCA MANUAL ---
    function abrirBuscaManual() {
        if(html5QrCode) stopScanner();
        document.getElementById('modal-busca-manual').style.display = 'block';
        setTimeout(() => document.getElementById('input-ud-manual').focus(), 200);
    }

    function fecharBuscaManual() {
        document.getElementById('modal-busca-manual').style.display = 'none';
        document.getElementById('input-ud-manual').value = '';
        document.getElementById('lista-resultados').innerHTML = '';
    }

    document.getElementById('input-ud-manual').addEventListener('input', function() {
        let termo = this.value;
        if (termo.length < 3) return;
        fetch(`/search_manual?q=${termo}`)
            .then(res => res.json())
            .then(data => {
                let lista = document.getElementById('lista-resultados');
                lista.innerHTML = '';
                data.forEach(item => {
                    let btn = document.createElement('button');
                    btn.className = 'list-group-item list-group-item-action bg-dark text-white border-secondary p-3 text-start';
                    btn.innerHTML = `<strong>UD: ${item.ud}</strong><br><small class="text-warning">${item.texto}</small>`;
                    btn.onclick = () => { fecharBuscaManual(); consultarUD(item.ud); };
                    lista.appendChild(btn);
                });
            });
    });
</script>
{% endblock %}
