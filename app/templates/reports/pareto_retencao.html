{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Pareto de Retenção (Vertical)</h2>
        <a href="{{ url_for('importer.index', data_filtro=data_atual) }}" class="btn btn-secondary">Voltar</a>
    </div>

    <div class="card shadow border-0 p-4" style="min-height: 500px;">
        <canvas id="chartParetoVertical"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('chartParetoVertical').getContext('2d');
    new Chart(ctx, {
        type: 'bar', // Tipo barra padrão é vertical
        data: {
            labels: {{ labels|tojson }},
            datasets: [{
                label: 'Soma de Dias Retidos',
                data: {{ valores|tojson }},
                backgroundColor: '#0d6efd',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { 
                    beginAtZero: true,
                    title: { display: true, text: 'Dias Acumulados' }
                },
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 45,
                        minRotation: 45
                    }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>
{% endblock %}
