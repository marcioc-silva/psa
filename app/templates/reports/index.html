{% extends "base.html" %}

{% block content %}
<div class="container text-center mt-3">
    <div class="mb-4">
        <h3 class="fw-bold text-secondary">
            <i class="bi bi-person-workspace me-2"></i>Cockpit de Supervisão
        </h3>
        <p class="text-muted small">Gestão de Qualidade e Acuracidade - Nestlé Araçatuba</p>
    </div>
    
    <div class="row g-3">
        <div class="col-12">
            <a href="{{ url_for('reports.kpis') }}" class="btn btn-primary w-100 py-4 shadow-sm fw-bold btn-acao border-0" style="background: linear-gradient(135deg, #0056b3, #00448b);">
                <i class="bi bi-speedometer2 display-4 d-block mb-2"></i>
                KPIs & PERFORMANCE (IRA)
            </a>
        </div>

        <div class="col-12">
            <a href="{{ url_for('reports.risco') }}" class="btn btn-warning w-100 py-4 shadow-sm fw-bold btn-acao text-dark border-0">
                <i class="bi bi-exclamation-octagon display-4 d-block mb-2"></i>
                RISCO & FEFO (VENCIMENTOS)
            </a>
        </div>

        <div class="col-12">
            <a href="{{ url_for('reports.alerta_critico') }}" class="btn btn-danger w-100 py-3 shadow-sm fw-bold btn-acao border-0">
                <i class="bi bi-shield-exclamation me-2"></i> ALERTA DE CONSUMO CRÍTICO
            </a>
        </div>

        <hr class="my-2 opacity-10">

        <div class="col-6">
            <a href="{{ url_for('reports.lista_materiais', tipo='encontrados') }}" class="btn btn-success w-100 py-3 shadow-sm fw-bold btn-acao border-0">
                <i class="bi bi-check-circle-fill d-block mb-1 fs-3"></i>
                ENCONTRADOS
            </a>
        </div>
        <div class="col-6">
            <a href="{{ url_for('reports.lista_materiais', tipo='pendentes') }}" class="btn btn-outline-danger w-100 py-3 shadow-sm fw-bold btn-acao bg-white">
                <i class="bi bi-question-circle-fill d-block mb-1 fs-3"></i>
                PENDENTES
            </a>
        </div>
    </div>
</div>

<style>
    .btn-acao {
        border-radius: 15px;
        transition: all 0.3s ease;
    }
    .btn-acao:hover {
        transform: translateY(-3px);
        filter: brightness(1.1);
    }
    .btn-acao:active {
        transform: scale(0.98);
    }
</style>
{% endblock %}
